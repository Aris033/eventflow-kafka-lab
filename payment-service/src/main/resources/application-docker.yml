spring:
  application:
    name: payment-service
  kafka:
    bootstrap-servers: eventflow-kafka:9092
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
    producer:
      properties:
        spring.json.add.type.headers: true
  datasource:
    url: jdbc:postgresql://eventflow-postgres:5432/eventflow
    username: eventflow
    password: eventflow
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: payment_schema
    open-in-view: false
  flyway:
    schemas: payment_schema
    default-schema: payment_schema

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: payment-service

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

eventflow:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:8086
  outbox:
    publisher:
      enabled: true
      fixed-delay: 5000
      batch-size: 20
      max-retries: 3
  payment:
    simulation:
      fail-on-customer-id-prefix: fail-payment-processing

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} [service=${spring.application.name}, correlationId=%X{correlationId}, eventId=%X{eventId}, orderId=%X{orderId}] - %msg%n"
