spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://localhost:5433/eventflow
    username: eventflow
    password: eventflow
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: payment_schema
    open-in-view: false
  flyway:
    schemas: payment_schema
    default-schema: payment_schema
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
    producer:
      properties:
        spring.json.add.type.headers: true

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

eventflow:
  outbox:
    publisher:
      enabled: true
      fixed-delay: 5000
      batch-size: 20
      max-retries: 3
  payment:
    simulation:
      fail-on-customer-id-prefix: fail-payment-processing
