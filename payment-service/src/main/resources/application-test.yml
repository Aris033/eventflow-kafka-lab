spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:h2:mem:payments;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: payment_schema
    open-in-view: false
  flyway:
    schemas: payment_schema
    default-schema: payment_schema
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info

eventflow:
  outbox:
    publisher:
      enabled: false
      fixed-delay: 5000
      batch-size: 20
      max-retries: 3
  payment:
    simulation:
      fail-on-customer-id-prefix: fail-payment-processing
