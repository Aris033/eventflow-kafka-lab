spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:orders;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: order_schema
    open-in-view: false
  flyway:
    schemas: order_schema
    default-schema: order_schema
  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info

eventflow:
  outbox:
    publisher:
      enabled: false
      fixed-delay: 5000
      batch-size: 20
      max-retries: 3
