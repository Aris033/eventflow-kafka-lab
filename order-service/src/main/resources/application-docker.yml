spring:
  application:
    name: order-service
  kafka:
    bootstrap-servers: eventflow-kafka:9092
    producer:
      properties:
        spring.json.add.type.headers: false
  datasource:
    url: jdbc:postgresql://eventflow-postgres:5432/eventflow
    username: eventflow
    password: eventflow
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: order_schema
    open-in-view: false
  flyway:
    schemas: order_schema
    default-schema: order_schema

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
