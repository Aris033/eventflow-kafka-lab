spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:h2:mem:notifications;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: notification_schema
    open-in-view: false
  flyway:
    schemas: notification_schema
    default-schema: notification_schema
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

eventflow:
  outbox:
    publisher:
      enabled: false
      fixed-delay: 5000
      batch-size: 20
      max-retries: 3
  notification:
    simulation:
      recipient-override:
